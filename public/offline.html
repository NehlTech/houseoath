<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>No Connection — House of Oath</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: #d4af35;
      --gold-light: #e8c84a;
      --canvas: #f8f9fa;
      --charcoal: #212529;
      --gray: #495057;
      --muted: #adb5bd;
      --card: #ffffff;
    }

    html, body {
      height: 100%;
      background: var(--canvas);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      color: var(--charcoal);
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      padding: env(safe-area-inset-top, 0px) 24px env(safe-area-inset-bottom, 0px);
      text-align: center;
    }

    .card {
      background: var(--card);
      border-radius: 24px;
      padding: 48px 40px;
      max-width: 420px;
      width: 100%;
      box-shadow: 0 4px 40px rgba(0,0,0,0.06), 0 1px 8px rgba(0,0,0,0.04);
    }

    /* Logo row */
    .logo-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 36px;
    }
    .logo-badge {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      overflow: hidden;
      border: 1.5px solid rgba(212,175,53,0.3);
      background: #fff;
    }
    .logo-badge img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }
    .logo-name {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.04em;
      color: var(--charcoal);
    }

    /* WiFi-off icon */
    .icon-wrapper {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      background: rgba(212,175,53,0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 28px;
    }
    .icon-wrapper svg {
      width: 44px;
      height: 44px;
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.01em;
      color: var(--charcoal);
      margin-bottom: 10px;
    }

    p.subtitle {
      font-size: 14px;
      color: var(--gray);
      line-height: 1.65;
      margin-bottom: 32px;
      max-width: 300px;
      margin-left: auto;
      margin-right: auto;
    }

    button#retry {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 13px 32px;
      background: var(--gold);
      color: #1a1a1a;
      border: none;
      border-radius: 12px;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s, box-shadow 0.15s;
      box-shadow: 0 2px 12px rgba(212,175,53,0.35);
      width: 100%;
      max-width: 240px;
    }
    button#retry:hover {
      background: var(--gold-light);
      box-shadow: 0 4px 20px rgba(212,175,53,0.45);
    }
    button#retry:active {
      transform: scale(0.97);
    }

    .status-pill {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 20px;
      padding: 10px 20px;
      border-radius: 100px;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.02em;
    }
    .status-pill.online {
      background: rgba(40,167,69,0.1);
      color: #1a7f37;
    }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #28a745;
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.6; transform: scale(1.2); }
    }

    .footer-text {
      margin-top: 40px;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    @media (max-width: 480px) {
      .card {
        padding: 40px 28px;
        border-radius: 20px;
      }
      h1 { font-size: 20px; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo-row">
      <div class="logo-badge">
        <img src="/ho_logo.png" alt="House of Oath" />
      </div>
      <span class="logo-name">House of Oath</span>
    </div>

    <div class="icon-wrapper">
      <!-- WiFi off icon -->
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M1 6C3.36764 3.96266 6.49744 2.75 9.99992 2.75C11.6651 2.75 13.258 3.06289 14.7165 3.63072" stroke="#d4af35" stroke-width="1.8" stroke-linecap="round"/>
        <path d="M5.26953 9.74219C6.75 8.72 8.52441 8.125 10.4434 8.125C11.4895 8.125 12.4928 8.31641 13.4186 8.66797" stroke="#d4af35" stroke-width="1.8" stroke-linecap="round"/>
        <path d="M8.38574 12.9609C9.02246 12.6914 9.7041 12.5469 10.4258 12.5469" stroke="#d4af35" stroke-width="1.8" stroke-linecap="round"/>
        <circle cx="10.4258" cy="17" r="1.5" fill="#d4af35"/>
        <path d="M3 3L21 21" stroke="#dc3545" stroke-width="1.8" stroke-linecap="round"/>
      </svg>
    </div>

    <h1>You're offline</h1>
    <p class="subtitle">
      Check your internet connection and try again. Your work is safe and will sync when you're back online.
    </p>

    <button id="retry" onclick="retryConnection()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
        <path d="M3 3v5h5"/>
        <path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16"/>
        <path d="M16 21h5v-5"/>
      </svg>
      Try again
    </button>

    <div class="status-pill online" id="online-pill">
      <span class="status-dot"></span>
      Connection restored — reloading…
    </div>
  </div>

  <p class="footer-text">House of Oath Fashion Studio</p>

  <script>
    function retryConnection() {
      const btn = document.getElementById('retry');
      btn.disabled = true;
      btn.textContent = 'Checking…';
      // Try to fetch a tiny cacheable asset to confirm connectivity
      fetch('/', { method: 'HEAD', cache: 'no-store' })
        .then(() => window.location.reload())
        .catch(() => {
          btn.disabled = false;
          btn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
            <path d="M3 3v5h5"/>
            <path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16"/>
            <path d="M16 21h5v-5"/>
          </svg> Try again`;
        });
    }

    // Auto-reload when connection comes back
    window.addEventListener('online', () => {
      const pill = document.getElementById('online-pill');
      pill.style.display = 'flex';
      setTimeout(() => window.location.reload(), 1200);
    });
  </script>
</body>
</html>
